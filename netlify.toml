# ================================================================
# CONFIGURATION NETLIFY — Portfolio Lycée Galandou Diouf
# ================================================================
# Ce fichier configure automatiquement ton site sur Netlify.
# Place-le à la racine de ton dossier avec index.html et admin.html
# ================================================================

[build]
  publish = "."

# ---- Redirection de la page d'accueil ----
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# ---- Protéger la page admin (optionnel) ----
# Tu peux décommenter les lignes ci-dessous pour ajouter
# une protection par mot de passe au niveau serveur pour /admin.html
# Mais le mot de passe JS dans admin.html est déjà suffisant.

# ---- En-têtes de sécurité ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ---- Cache pour les ressources statiques ----
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"